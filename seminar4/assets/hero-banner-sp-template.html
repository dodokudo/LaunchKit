<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px;
  height: 680px;
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(160deg, #0F172A 0%, #1a2744 50%, #0F172A 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
  border-radius: 50%;
}
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 40px;
}
.pre-badge {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 32px;
  font-weight: 800;
  padding: 14px 40px;
  border-radius: 16px;
  margin-bottom: 32px;
  letter-spacing: 0.03em;
}
.sub-text {
  color: rgba(255,255,255,0.8);
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 0.04em;
}
.main-title {
  color: #fff;
  font-size: 52px;
  font-weight: 900;
  line-height: 1.4;
  letter-spacing: 0.02em;
}
.main-title .deco {
  color: rgba(255,255,255,0.5);
  font-size: 42px;
}
.main-title .accent {
  background: linear-gradient(135deg, #8B5CF6, #06B6D4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.bottom-line {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #8B5CF6, #06B6D4);
}
</style>
</head>
<body>
  <div class="content">
    <div class="pre-badge">たった1投稿でフォロワー1,000人増加！</div>
    <p class="sub-text">後発組・フォロワー100人以下でも</p>
    <h1 class="main-title">
      <span class="deco">＼</span> Threadsで<br><span class="accent">1撃で集客できる方法</span><br>を公開! <span class="deco">／</span>
    </h1>
  </div>
  <div class="bottom-line"></div>
</body>
</html>
